<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,initial-scale=1">

    <title>Bank QR Manager V3</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="layout">

        <!-- Sidebar -->
        <div class="sidebar">

            <h2>NPL PANEL</h2>

            <button class="menuBtn active" id="homeBtn">🏠 Home</button>

            <button class="menuBtn" id="belowBtn">💰 10K Below Banks</button>

            <button class="menuBtn" id="aboveBtn">💵 10K Above Banks</button>

            <button class="menuBtn" id="merchantBtn">🏢 Merchant Banks</button>

            <button class="menuBtn">⚙ Options</button>

        </div>

        <!-- Main Content -->

    <!-- MAIN -->

    <div class="mainContent">

    <!-- ========================= -->
    <!-- HEADER -->
    <!-- ========================= -->

    <div class="header">

        <div class="title">

            🏦 Bank QR Manager

        </div>

        <input
            type="text"
            id="searchInput"
            placeholder="Search Bank...">

    </div>



    <!-- ========================= -->
    <!-- TOOLBAR -->
    <!-- ========================= -->

    <div class="toolbar">

        <div class="stats">

    <div class="statCard">

        <h3 id="totalBanks">0</h3>

        <p>Total Banks</p>

    </div>

    <div class="statCard">

        <h3 id="favoriteBanks">0</h3>

        <p>Favorites</p>

    </div>

</div>
        

        <button id="addBankBtn">

            ➕ Add Bank

        </button>

        <button id="exportBtn">

            📤 Export

        </button>

        <button id="importBtn">

            📥 Import

        </button>

    </div>

    



    <input
        type="file"
        id="importFile"
        hidden>



    <!-- ========================= -->
    <!-- BANK LIST -->
    <!-- ========================= -->

    <div id="bankContainer">

    </div>

</div>

<!-- ========================= -->
<!-- ADD BANK MODAL -->
<!-- ========================= -->

<div class="modal" id="addModal">

    <div class="modalContent">

        <h2>Add Bank</h2>

        <label>Display Name</label>
        <input type="text" id="displayName">

        <label>Bank Category *</label>

<div class="categoryBox">

    <label class="categoryItem">
        <input type="radio" name="category" value="10K Below">
        💰 10K Below Banks
    </label>

    <label class="categoryItem">
        <input type="radio" name="category" value="10K Above">
        💵 10K Above Banks
    </label>

    <label class="categoryItem">
        <input type="radio" name="category" value="Merchant">
        🏢 Merchant Banks
    </label>

</div>

        <label>Bank Logo</label>
        <input type="file"
               id="bankLogo"
               accept="image/*">

               <img id="logoPreview" class="previewImage" src="">

        <label>QR Image</label>
        <input type="file"
               id="qrImage"
               accept="image/*">

               <img id="qrPreview" class="previewImage" src="">

        <label class="checkRow">

            <input
                type="checkbox"
                id="extraToggle">

            Add Bank Details

        </label>

        <div id="extraSection">

            <label>Account Holder</label>
            <input
                type="text"
                id="holderName">

            <label>Account Number</label>
            <input
                type="text"
                id="accountNumber">

            <label>Bank Name</label>
            <input
                type="text"
                id="bankName">

            <label>Branch Name</label>
            <input
                type="text"
                id="branchName">

            <label>Remarks</label>
            <input
                type="text"
                id="remarks">

        </div>

        <div class="buttonRow">

            <button id="saveBank">

                💾 Save

            </button>

            <button id="closeModal">

                ✖ Close

            </button>

        </div>

    </div>

</div>

<!-- ========================= -->
<!-- VIEW QR MODAL -->
<!-- ========================= -->

<div class="modal" id="viewModal">

    <div class="viewContent">

        <h2>QR Preview</h2>

        <img
            id="viewImage"
            src=""
            alt="QR Preview">

        <div class="buttonRow">

            <button id="downloadQR">

                📥 Download

            </button>

            <button id="closeView">

                ✖ Close

            </button>

        </div>

    </div>

</div>

<div id="toast"></div>

<script src="script.js"></script>


</body>
</html>
