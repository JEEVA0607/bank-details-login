<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Bank Details</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="background"></div>

<div class="login-container">

    <div class="logo">
        💬
    </div>

    <h1>Nepal Bank Details</h1>

    <p class="subtitle">
        Secure Internal Communication
    </p>

    <form id="loginForm">

        <div class="input-group">
            <label>Username</label>

            <input
                type="text"
                id="username"
                placeholder="Enter Username"
                autocomplete="off"
                required
            >
        </div>

        <div class="input-group">

            <label>Password</label>

            <div class="password-box">

                <input
                    type="password"
                    id="password"
                    placeholder="Enter Password"
                    required
                >

                <button
                    type="button"
                    id="togglePassword"
                >
                    👁
                </button>

            </div>

        </div>

        <div class="options">

            <label class="remember">

                <input
                    type="checkbox"
                    id="remember"
                >

                Remember Me

            </label>

        </div>

        <button
            type="submit"
            class="login-btn"
        >
            LOGIN
        </button>

        <p id="errorMessage"></p>

    </form>

    <div class="footer">

        © 2026 Wolf777 Nepal Bank Details

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
